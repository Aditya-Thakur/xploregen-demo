<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xploregen · Mobile Redesign · Print</title>
  <link rel="icon" href="assets/logo-favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    @page { size: A4 landscape; margin: 0; }
    html, body {
      margin: 0; padding: 0;
      background: #fafaf6;
      color: #13110d;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    #root { display: flex; flex-direction: column; }
    .page {
      width: 297mm; height: 210mm;
      background: #fafaf6;
      box-sizing: border-box;
      page-break-after: always;
      break-after: page;
      page-break-inside: avoid;
      break-inside: avoid;
      position: relative;
      overflow: hidden;
    }
    .page:last-child { page-break-after: auto; break-after: auto; }

    /* In screen mode (the preview), add some breathing room between pages */
    @media screen {
      body { padding: 20px 0; }
      .page {
        margin: 0 auto 20px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.05);
      }
    }
    @media print {
      body { padding: 0; background: white; }
      .page { box-shadow: none; margin: 0; }
      /* Ensure backgrounds + colors render */
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }

    /* Hide scrollbars inside the phone frames */
    .page ::-webkit-scrollbar { display: none; }
    .page * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Starter components (used directly, no DesignCanvas) -->
  <script type="text/babel" src="ios-frame.jsx"></script>

  <!-- Shared library + directions -->
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>

  <!-- Paged print app (renders + auto-prints) -->
  <script type="text/babel" src="print-app.jsx"></script>
</body>
</html>
